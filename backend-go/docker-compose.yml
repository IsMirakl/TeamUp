version: '3.8'


services:
  postgres:
    image: postgres:18.3-alpine
    container_name: team_up
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      ports:
        "5432:5432"

      volumes:
        -postgres_data:/var/lib/postgresql/postgres_data

volumes:
    postgres_data:

