all: false
dir: "{{.InterfaceDir}}"
filename: "mock_{{.InterfaceName}}.go"
force-file-write: true
formatter: goimports
generate: true
include-auto-generated: false
log-level: info
structname: "{{.Mock}}{{.InterfaceName}}"
pkgname: "{{.SrcPackageName}}"
recursive: false
require-template-schema-exists: true
template: testify
template-schema: "{{.Template}}.schema.json"

packages:
  backend/internal/identity/application/command/login_user:
    config:
      dir: internal/identity/application/command/login_user/mocks
      pkgname: mocks
    interfaces:
      Repository: {}
      SessionService: {}
      
  backend/internal/pkg/utils:
    config:
      dir: internal/pkg/utils/mocks
      pkgname: mocks
    interfaces:
      TokenService: {}