name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Backend test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod
          cache: true
          cache-dependency-path: backend-go/go.sum

      - name: Go version
        run: go version

      - name: Verify gofmt
        shell: bash
        run: |
          set -euo pipefail
          fmt_out="$(gofmt -l .)"
          if [[ -n "${fmt_out}" ]]; then
            echo "gofmt needed on:"
            echo "${fmt_out}"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Verify go.mod/go.sum tidy
        run: go mod tidy -diff

  build:
    name: Backend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod
          cache: true
          cache-dependency-path: backend-go/go.sum

      - name: Build
        run: go build ./...
